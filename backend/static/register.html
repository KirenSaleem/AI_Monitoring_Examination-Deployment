<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamGuard — Student Registration</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 50%, #e0e7ff 100%);
      padding: 24px 16px;
      color: #1e293b;
    }
    .card {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(30, 41, 59, 0.08);
    }
    h1 { font-size: 1.35rem; margin: 0 0 6px; }
    .sub { color: #64748b; font-size: 0.9rem; margin-bottom: 24px; }
    label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 18px;
    }
    input[readonly] { background: #f1f5f9; letter-spacing: 0.15em; font-weight: 700; }
    button {
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
    .msg.error { background: #fef2f2; color: #b91c1c; display: block; }
    .msg.success { background: #ecfdf5; color: #047857; display: block; }

    .photo-section { text-align: center; margin-bottom: 20px; }
    .preview-wrap {
      width: 112px;
      height: 112px;
      margin: 0 auto 12px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #c7d2fe;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .preview-wrap .placeholder {
      font-size: 2.5rem;
      color: #94a3b8;
    }
    .photo-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-gallery {
      background: #4f46e5;
      color: #fff;
      flex: 1;
      min-width: 140px;
    }
    .btn-camera {
      background: #fff;
      color: #4f46e5;
      border: 2px solid #4f46e5;
      flex: 1;
      min-width: 140px;
    }
    .btn-submit {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
    }
    .hint { font-size: 0.75rem; color: #64748b; margin-top: 8px; }
    .hidden-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Student Registration</h1>
    <p class="sub">No account needed. Fill in your details for this classroom.</p>

    <form id="regForm">
      <label for="classroom_code">Classroom Code</label>
      <input type="text" id="classroom_code" name="classroom_code" readonly required />

      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required placeholder="Your full name" />

      <label for="roll_number">Roll Number</label>
      <input type="text" id="roll_number" name="roll_number" required placeholder="e.g. 2021-CS-001" />

      <label>Profile Picture</label>
      <div class="photo-section">
        <div class="preview-wrap" id="previewWrap">
          <span class="placeholder" id="placeholder">👤</span>
          <img id="preview" alt="Profile preview" />
        </div>
        <div class="photo-actions">
          <button type="button" class="btn-gallery" id="btnGallery">Choose from Gallery</button>
          <button type="button" class="btn-camera" id="btnCamera">Take Photo</button>
        </div>
        <p class="hint">JPEG, PNG, or WebP · large photos are compressed automatically</p>
        <!-- Gallery: broad accept for Android/iOS full library access -->
        <input
          type="file"
          id="inputGallery"
          class="hidden-input"
          accept="image/jpeg,image/jpg,image/png,image/webp,image/heic,image/heif,.jpg,.jpeg,.png,.webp,.heic,.heif,image/*"
        />
        <!-- Camera -->
        <input
          type="file"
          id="inputCamera"
          class="hidden-input"
          accept="image/*"
          capture="environment"
        />
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Submit Registration</button>
    </form>
    <div id="message" class="msg"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const codeInput = document.getElementById('classroom_code');
    const code = (params.get('code') || '').trim().toUpperCase();
    codeInput.value = code;

    const preview = document.getElementById('preview');
    const placeholder = document.getElementById('placeholder');
    const inputGallery = document.getElementById('inputGallery');
    const inputCamera = document.getElementById('inputCamera');
    const btnGallery = document.getElementById('btnGallery');
    const btnCamera = document.getElementById('btnCamera');

    let selectedFile = null;
    let previewUrl = null;

    function revokePreview() {
      if (previewUrl) {
        URL.revokeObjectURL(previewUrl);
        previewUrl = null;
      }
    }

    function showPreview(file) {
      revokePreview();
      previewUrl = URL.createObjectURL(file);
      preview.src = previewUrl;
      preview.style.display = 'block';
      placeholder.style.display = 'none';
    }

    function clearPreview() {
      revokePreview();
      selectedFile = null;
      preview.src = '';
      preview.style.display = 'none';
      placeholder.style.display = 'block';
      inputGallery.value = '';
      inputCamera.value = '';
    }

    async function compressImage(file, maxDim = 1024, quality = 0.82) {
      if (!file.type.startsWith('image/')) {
        throw new Error('Please select a valid image file.');
      }
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let w = img.width;
          let h = img.height;
          const longest = Math.max(w, h);
          if (longest > maxDim) {
            const scale = maxDim / longest;
            w = Math.round(w * scale);
            h = Math.round(h * scale);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob(
            (blob) => {
              if (!blob) {
                reject(new Error('Could not process image. Try another photo.'));
                return;
              }
              const name = (file.name || 'photo').replace(/\.[^.]+$/, '') + '.jpg';
              resolve(new File([blob], name, { type: 'image/jpeg', lastModified: Date.now() }));
            },
            'image/jpeg',
            quality
          );
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error('Invalid or unsupported image. Please choose another.'));
        };
        img.src = url;
      });
    }

    async function handleFileInput(file) {
      if (!file) return;
      const msg = document.getElementById('message');
      msg.className = 'msg';
      msg.textContent = '';
      try {
        btnGallery.disabled = true;
        btnCamera.disabled = true;
        selectedFile = await compressImage(file);
        showPreview(selectedFile);
      } catch (err) {
        clearPreview();
        msg.className = 'msg error';
        msg.textContent = err.message || 'Failed to load image.';
      } finally {
        btnGallery.disabled = false;
        btnCamera.disabled = false;
      }
    }

    btnGallery.addEventListener('click', () => inputGallery.click());
    btnCamera.addEventListener('click', () => inputCamera.click());
    inputGallery.addEventListener('change', (e) => handleFileInput(e.target.files[0]));
    inputCamera.addEventListener('change', (e) => handleFileInput(e.target.files[0]));

    const form = document.getElementById('regForm');
    const msg = document.getElementById('message');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'msg';
      msg.textContent = '';
      btn.disabled = true;

      if (!codeInput.value.trim()) {
        msg.className = 'msg error';
        msg.textContent = 'Missing classroom code. Open the link shared by your teacher.';
        btn.disabled = false;
        return;
      }

      if (!selectedFile) {
        msg.className = 'msg error';
        msg.textContent = 'Please choose a profile picture from gallery or camera.';
        btn.disabled = false;
        return;
      }

      const fd = new FormData();
      fd.append('classroom_code', codeInput.value.trim());
      fd.append('name', document.getElementById('name').value.trim());
      fd.append('roll_number', document.getElementById('roll_number').value.trim());
      fd.append('profile_image', selectedFile, selectedFile.name);

      try {
        const res = await fetch('/students/register', {
          method: 'POST',
          body: fd,
          headers: { 'ngrok-skip-browser-warning': '69420' },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          let err = 'Registration failed';
          const d = data.detail;
          if (typeof d === 'string') err = d;
          else if (Array.isArray(d)) err = d.map((x) => x.msg || x).join(', ');
          throw new Error(err);
        }
        msg.className = 'msg success';
        msg.textContent = 'Registration successful! You may close this page.';
        form.reset();
        codeInput.value = code;
        clearPreview();
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = err.message || 'Something went wrong. Try again.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
